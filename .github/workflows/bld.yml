name: Deploy

env:
  IMAGE: imt-on-premise:${{ github.sha }}
  CI_COMMIT_REF_NAME: ${{ github.ref_name }}
  CI_PIPELINE_ID: ${{ github.run_number }}
  PUBLIC_PROJECT_NAME: imt-on-premise

on:
  push:
    branches: ["develop", "main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout enterprise SDK submodule
        run: |
          git config --global url."https://x-access-token:${ENTERPRISE_SDK_READ_TOKEN}@github.com/immersive-translate/".insteadOf "https://github.com/immersive-translate/"
          git submodule update --init --recursive vendor/enterprise-sdk
        env:
          ENTERPRISE_SDK_READ_TOKEN: ${{ secrets.ENTERPRISE_SDK_READ_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_REGISTRY }}/${{ env.IMAGE }}
          cache-from: type=gha,scope=imt-on-premise-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=imt-on-premise-${{ github.ref_name }}

      - name: Print image url
        run: echo "${{ secrets.DOCKER_REGISTRY }}/${{ env.IMAGE }}"

  deploy:
    needs: build-and-push
    runs-on: imt
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Chart
        run: rm -rf imt-chart && helm repo add tuiwen-charts https://chartmuseum.tuiwen-tech.com/ --force-update && helm repo update && helm fetch tuiwen-charts/imt-chart --untar

      - name: Deploy to Prod
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          cp ./deploy/boot-license.json ./imt-chart/boot.json
          envsubst < ./deploy/values-prod.yaml > values.yaml
          helm template -f values.yaml imt-chart --namespace imt > settings.yaml
          python3 .github/scripts/append-sdk-ingress.py settings.yaml
          kubectl apply -f settings.yaml --namespace imt

      - name: Deploy to Test
        if: ${{ github.ref == 'refs/heads/develop' }}
        run: |
          cp ./deploy/boot-license.json ./imt-chart/boot.json
          envsubst < ./deploy/values-test.yaml > values.yaml
          helm template -f values.yaml imt-chart --namespace imt-test > settings.yaml
          python3 .github/scripts/append-sdk-ingress.py settings.yaml
          kubectl apply -f settings.yaml --namespace imt-test
